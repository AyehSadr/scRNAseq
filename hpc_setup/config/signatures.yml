# ============================================================
# Curated gene signatures for UCell scoring in seurat_03 and beyond.
# Each entry has:
#   description : short note
#   citation    : where the list came from
#   genes       : HGNC symbols (case-sensitive)
# Add new signatures by appending; do not edit gene lists in-place once a
# manuscript figure has been generated from them (track version in git).
# ============================================================

# --- Leukaemic / stemness ----------------------------------------------------

lsc17:
  description: 17-gene LSC score, prognostic in AML
  citation: Ng SWK et al., Nature 540(7633):433-437, 2016
  genes: [DNMT3B, ZBTB46, NYNRIN, ARHGAP22, LAPTM4B, MMRN1, DPYSL3, KIAA0125,
          CDK6, CPXM1, SOCS2, SMIM24, EMP1, NGFRAP1, CD34, AKR1C3, GPR56]

eppert_hsc:
  description: HSC self-renewal gene set from xenotransplant LSC screen
