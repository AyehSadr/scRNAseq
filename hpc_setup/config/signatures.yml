# --- van Galen Cell 2019 supplementary Table S4A specificity-correlated signatures ---
#
# Derived from Table S4A "Correlation to prediction score in malignant cells" columns,
# filtered on:
#   - correlation in target class >= 0.10
#   - margin over other two classes >= 0.05
#   - manual housekeeping denylist (ribosomal, eIF*, ubiquitin, actin/tubulin, MT-*,
#     histones, MALAT1/NEAT1, etc.)
# Then top 40 by correlation within survivors per class.
#
# Note: van Galen Table S4A has THREE classes (HSC/Prog, GMP, Myeloid) — Promonocyte
# and Monocyte are merged into Myeloid in this table. Argmax classification using
# these three lists gives the cleanest van-Galen-style class call. The previous
# four-class mmc4 lists (deprecated 2026-05-23) leaked housekeeping into mono and
# produced a degenerate argmax — see 03f from that run.

vgalen_hsc_s4a:
  description: HSC/Prog-like — top S4A correlation-specific, housekeeping-filtered
  citation: van Galen P et al., Cell 176(6):1265-1281, 2019 (Table S4A; corr>=0.10, margin>=0.05)
  # 2026-05-23 audit: removed LRRC75A-AS1, TAPT1-AS1, DBET, LINC01623 — lncRNAs that
  # are inconsistently retained across CellRanger reference versions and can be
  # silently dropped by UCell, shrinking the effective signature.
  genes: [GAS5, ANGPT1, GUCY1A3, PTPRCAP, DSE, SOX4, EGFL7, CD96, CD34, NPR3,
          PEBP1, SPN, C1orf186, FLT3, TPM4, SLC38A1, STON2, CD200, PARP1, BMI1,
          SATB1, KMT2A, PIM1, TMEM123, HERC2, CHD4, HSH2D, PDLIM1, GNPTAB, IL2RA,
          CPNE1, CD52, CD74, DDX17, ARHGAP25, CIRBP]

vgalen_gmp_s4a:
  description: GMP-like — top S4A correlation-specific, housekeeping-filtered
  citation: van Galen P et al., Cell 176(6):1265-1281, 2019 (Table S4A; corr>=0.10, margin>=0.05)
  # 2026-05-23 audit: removed RNA5-8S — that's 5.8S ribosomal RNA, ambient-RNA
  # pollutant; would inflate GMP scores in low-quality/dying cells.
  genes: [PRSS57, POU4F1, CALR, CLEC11A, LINC01835, MIF, C1QTNF4, TRH, TM7SF3,
          RUNX1T1, MYC, HMGA1, C1QBP, CAV1, MDK, MGST1, C1orf228, RAPGEF6, PRAME,
          THSD7A, VAMP8, MLEC, CCND1, CAT, COMT, FAM46A, CITED2, GTSF1, TARP]

vgalen_myeloid_s4a:
  description: Myeloid-like (combines promono + mono in S4A) — top S4A correlation-specific
  citation: van Galen P et al., Cell 176(6):1265-1281, 2019 (Table S4A; corr>=0.10, margin>=0.05)
  genes: [PSAP, S100A6, LGALS3, ADA2, CFD, MARCKS, CD68, S100A4, SCPEP1, GRN,
          TYROBP, ITGB2, JUN, VMP1, LCP1, TNFAIP2, AHNAK, CTSB, MS4A7, EVI2B,
          IQGAP1, CST3, PLD3, CTSD, CLEC12A, DUSP1, FYB1, LGALS1, TMSB10, LMNA,
          DMXL2, LAPTM5, HSPA5, CXCL8, PLIN2, LST1, EMB, VSIR, NFKBIZ, TSPO]
