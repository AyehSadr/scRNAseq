name: cellecta
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pip
  - cutadapt>=4.9
  - starcode>=1.4
  - seqkit>=2.8
  - samtools=1.20
  - pysam>=0.22
  - pyfastx>=2.1
  - regex
  - biopython
  - pandas
  - numpy
  - tqdm
  - rich
  - pip:
      - bartab           # Nextflow companion utils + standalone CLI for lineage barcode workflows
      - pycashier        # alternative extractor with built-in error tolerance
